<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="utility.css">
</head>

<body>
    <nav class="flex">
        <div class="logo">
            <img src="icons/logo.svg" alt="" width="30px">
        </div>
        <div class="home">
            <img src="icons/home-icon-silhouette-svgrepo-com.svg" alt="" width="25px">
        </div>
        <input type="text" class="search flex" placeholder="What do you want to play next?">

        <div class="premium">Explore Premium</div>
        <div class="install flex">
            <img src="icons/download.svg" alt="" width="15px">
            <div class="installword">Install App</div>
        </div>
        <div class="notify">
            <img src="icons/bell.svg" alt="" width="20px">
        </div>
        <div class="account">
            <img src="icons/person-circle.svg" alt="" width="35px">
        </div>
    </nav>
    <div class="container flex">
        <div class="library">
            <div class="libraryNav flex">
                <div class="item">Your Library</div>
                <div class="item">
                    <img src="icons/plus-circle.svg" alt="">
                </div>
                <div class="item">
                    <img src="icons/arrow-right-short.svg" alt="">
                </div>
                <div class="item"></div>
            </div>
        </div>
        <div class="section">Section
            Linear Gradient Background
        </div>
    </div>
    <footer>
        Media Functions
    </footer>
</body>

</html>
